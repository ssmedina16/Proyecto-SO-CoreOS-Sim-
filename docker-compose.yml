services:
  coreos-sim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coreos_sim_venalum
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - IN_DOCKER=true
    volumes:
      # Monta el directorio de logs del host en el contenedor
      # para que los archivos .csv y .log sean accesibles desde Windows
      - ./logs:/app/logs
    restart: unless-stopped
